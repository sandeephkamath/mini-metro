name: Build Android APK

on:
  push:
    branches: [main]
  workflow_dispatch: {}

jobs:
  build-apk:
    runs-on: ubuntu-latest
    env:
      HAS_GOOGLE_SERVICES_JSON: ${{ secrets.ANDROID_GOOGLE_SERVICES_JSON != '' }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - run: npm ci

      - run: npm run build
        env:
          VITE_FIREBASE_API_KEY: ${{ secrets.VITE_FIREBASE_API_KEY }}
          VITE_FIREBASE_AUTH_DOMAIN: ${{ secrets.VITE_FIREBASE_AUTH_DOMAIN }}
          VITE_FIREBASE_PROJECT_ID: ${{ secrets.VITE_FIREBASE_PROJECT_ID }}
          VITE_FIREBASE_STORAGE_BUCKET: ${{ secrets.VITE_FIREBASE_STORAGE_BUCKET }}
          VITE_FIREBASE_MESSAGING_SENDER_ID: ${{ secrets.VITE_FIREBASE_MESSAGING_SENDER_ID }}
          VITE_FIREBASE_APP_ID: ${{ secrets.VITE_FIREBASE_APP_ID }}
          VITE_ADMOB_REWARDED_AD_UNIT_ID: ${{ secrets.VITE_ADMOB_REWARDED_AD_UNIT_ID }}

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'

      - uses: gradle/actions/setup-gradle@v4

      # android/local.properties is gitignored (see android/local.properties.example) —
      # build.gradle falls back to Google's public test AdMob App ID and an empty/disabled
      # Play Games config when these are unset, so the build still succeeds without secrets.
      - name: Write android/local.properties
        run: |
          {
            echo "ADMOB_APP_ID=${{ secrets.ADMOB_APP_ID }}"
            echo "PLAY_GAMES_APP_ID=${{ secrets.PLAY_GAMES_APP_ID }}"
            echo "PLAY_GAMES_WEB_CLIENT_ID=${{ secrets.PLAY_GAMES_WEB_CLIENT_ID }}"
          } > android/local.properties

      # android/app/google-services.json is gitignored too — build.gradle only applies
      # the google-services plugin if the file exists, so this is optional as well.
      - name: Write android/app/google-services.json
        if: ${{ env.HAS_GOOGLE_SERVICES_JSON == 'true' }}
        env:
          GOOGLE_SERVICES_JSON: ${{ secrets.ANDROID_GOOGLE_SERVICES_JSON }}
        run: echo "$GOOGLE_SERVICES_JSON" > android/app/google-services.json

      # Without this, the debug build type falls back to the Android Gradle Plugin's
      # implicit default debug signing config, which auto-generates a brand new
      # ~/.android/debug.keystore (random key pair) on any machine/runner where one
      # doesn't already exist — a fresh one every run on GitHub's ephemeral runners.
      # Play Games Services' Android OAuth client is registered against one specific
      # keystore's SHA-1 (themes/metro.md §11 B28), so a debug APK signed
      # with a different, ad-hoc keystore silently fails Play Games Sign-In: no error,
      # just an absent identity (no "View Leaderboard" button, ever). Writing this same
      # stable keystore to the default path before the build keeps every CI-built debug
      # APK's SHA-1 matching what's actually registered in Play Console.
      - name: Write stable debug keystore
        if: ${{ secrets.ANDROID_DEBUG_KEYSTORE_BASE64 != '' }}
        env:
          DEBUG_KEYSTORE_BASE64: ${{ secrets.ANDROID_DEBUG_KEYSTORE_BASE64 }}
        run: |
          mkdir -p ~/.android
          echo "$DEBUG_KEYSTORE_BASE64" | base64 --decode > ~/.android/debug.keystore

      - run: npx cap sync android

      - name: Build debug APK
        working-directory: android
        run: ./gradlew assembleDebug --no-daemon

      - uses: actions/upload-artifact@v4
        with:
          name: mini-metro-debug-apk
          path: android/app/build/outputs/apk/debug/*.apk
